version: '3.8'

services:
  mongo:
    image: mongo:7
    container_name: cv_mongo
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    networks:
      - cv_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cv_backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongo:27017/cvmanager
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - NODE_ENV=production
      - FRONTEND_URL=http://localhost

       
    depends_on:
      - mongo
    networks:
      - cv_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cv_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - cv_network

volumes:
  mongo_data:

networks:
  cv_network:
    driver: bridge